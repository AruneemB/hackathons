<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aruneem's Hackathon Projects</title>
  <meta name="description" content="A timeline of hackathon projects">
  <meta name="theme-color" content="#0a0a0a">

  <meta property="og:title" content="Aruneem's Hackathon Projects">
  <meta property="og:description" content="A timeline of hackathon projects">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap">

  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="hero" id="top">
    <div id="github-profile"></div>
    <div class="hero__content">
      <h1 class="hero__title">Aruneem's Hackathon Projects</h1>
      <p class="hero__subtitle">An archive of competitive builds across software engineering, ML, and full-stack development</p>
      <div class="hero__stats" id="hero-stats"></div>
    </div>
    <div class="skills-carousel" id="skills-carousel">
      <div class="skills-carousel__track" id="skills-track"></div>
    </div>
  </header>

  <main class="timeline" id="timeline">
    <div class="timeline__line" aria-hidden="true"></div>
  </main>

  <footer class="footer">
    <p>&copy; 2026</p>
  </footer>

  <!-- Chat UI -->
  <div id="chat-widget" class="chat-widget hidden">
    <div class="chat-widget__header">
      <div class="chat-widget__title">
        <span class="chat-widget__project-name">Project Chat</span>
        <span class="chat-widget__status">online</span>
      </div>
      <button class="chat-widget__close" id="chat-close" aria-label="Close chat">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="chat-widget__messages" id="chat-messages">
      <div class="chat-message chat-message--bot">
        Hi there! I'm Aruneem's project assistant. Ask me anything about this project!
      </div>
    </div>
    <form class="chat-widget__input-area" id="chat-form">
      <input type="text" id="chat-input" placeholder="Type your question..." autocomplete="off">
      <button type="submit" id="chat-send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
